version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: amc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amc_dashboard
      POSTGRES_USER: ${POSTGRES_USER:-amc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amc_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-amc_user}:${POSTGRES_PASSWORD}@postgres:5432/amc_dashboard
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-hello@formium.in}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Formium Agency}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      WHOIS_API_KEY: ${WHOIS_API_KEY:-}
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET required}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/public/uploads

  # Cron job container — runs the daily automation
  cron:
    image: alpine:3.19
    container_name: amc_cron
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: http://app:3000
    command: |
      sh -c "
        echo '0 8 * * * wget -q -O- --header=\"Authorization: Bearer \$\$CRON_SECRET\" \$\$APP_URL/api/cron >> /var/log/cron.log 2>&1' > /etc/crontabs/root
        crond -f -l 2
      "

volumes:
  postgres_data:
  app_uploads:
